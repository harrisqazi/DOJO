openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FormFlow API - AI Martial Arts Form Trainer
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User profile management
  - name: dojos
    description: Dojo management
  - name: disciplines
    description: Discipline management
  - name: forms
    description: Form management
  - name: postures
    description: Posture management
  - name: joints
    description: Joint rule management
  - name: sessions
    description: Training sessions
  - name: stripe
    description: Stripe payment webhooks
  - name: admin
    description: Platform admin
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Auth ─────────────────────────────────────────────────────────────────
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthenticated

  # ─── Users ────────────────────────────────────────────────────────────────
  /users/profile:
    patch:
      operationId: updateProfile
      tags: [users]
      summary: Update user profile (name, camera side preference)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users (admin only)
      parameters:
        - in: query
          name: role
          schema:
            type: string
        - in: query
          name: dojo_id
          schema:
            type: string
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{userId}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user role/dojo (admin only)
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}/sessions:
    get:
      operationId: getUserSessions
      tags: [users]
      summary: Get session history for a user
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"

  # ─── Dojos ────────────────────────────────────────────────────────────────
  /dojos:
    get:
      operationId: listDojos
      tags: [dojos]
      summary: List all dojos (admin) or single dojo (dojo_admin)
      responses:
        "200":
          description: List of dojos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Dojo"
    post:
      operationId: createDojo
      tags: [dojos]
      summary: Create a new dojo (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DojoInput"
      responses:
        "201":
          description: Created dojo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dojo"

  /dojos/{dojoId}:
    get:
      operationId: getDojo
      tags: [dojos]
      summary: Get dojo by ID
      parameters:
        - in: path
          name: dojoId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Dojo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dojo"
    patch:
      operationId: updateDojo
      tags: [dojos]
      summary: Update dojo settings
      parameters:
        - in: path
          name: dojoId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DojoUpdate"
      responses:
        "200":
          description: Updated dojo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dojo"
    delete:
      operationId: deleteDojo
      tags: [dojos]
      summary: Delete a dojo (admin only)
      parameters:
        - in: path
          name: dojoId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /dojos/by-slug/{slug}:
    get:
      operationId: getDojoBySlug
      tags: [dojos]
      summary: Get public dojo info by slug (no auth required)
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public dojo info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DojoPublic"

  /dojos/{dojoId}/stats:
    get:
      operationId: getDojoStats
      tags: [dojos]
      summary: Get stats for a dojo (students, sessions, avg score)
      parameters:
        - in: path
          name: dojoId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Dojo stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DojoStats"

  /dojos/{dojoId}/students:
    get:
      operationId: getDojoStudents
      tags: [dojos]
      summary: Get students in a dojo
      parameters:
        - in: path
          name: dojoId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"

  /dojos/{dojoId}/invite:
    post:
      operationId: regenerateInviteCode
      tags: [dojos]
      summary: Regenerate the dojo invite code
      parameters:
        - in: path
          name: dojoId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: New invite code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteCode"

  /dojos/{dojoId}/leave:
    post:
      operationId: leaveDojo
      tags: [dojos]
      summary: Leave a dojo (student only)
      parameters:
        - in: path
          name: dojoId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success

  /dojos/{dojoId}/remove-student/{userId}:
    delete:
      operationId: removeStudentFromDojo
      tags: [dojos]
      summary: Remove a student from dojo (dojo_admin only)
      parameters:
        - in: path
          name: dojoId
          required: true
          schema:
            type: string
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Removed

  /dojos/join:
    post:
      operationId: joinDojoByInvite
      tags: [dojos]
      summary: Join a dojo by invite code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinDojoInput"
      responses:
        "200":
          description: Joined dojo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dojo"

  # ─── Disciplines ──────────────────────────────────────────────────────────
  /disciplines:
    get:
      operationId: listDisciplines
      tags: [disciplines]
      summary: List all disciplines (public + dojo-specific)
      parameters:
        - in: query
          name: dojo_id
          schema:
            type: string
      responses:
        "200":
          description: List of disciplines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Discipline"
    post:
      operationId: createDiscipline
      tags: [disciplines]
      summary: Create a discipline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisciplineInput"
      responses:
        "201":
          description: Created discipline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discipline"

  /disciplines/{disciplineId}:
    patch:
      operationId: updateDiscipline
      tags: [disciplines]
      summary: Update a discipline
      parameters:
        - in: path
          name: disciplineId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisciplineUpdate"
      responses:
        "200":
          description: Updated discipline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discipline"
    delete:
      operationId: deleteDiscipline
      tags: [disciplines]
      summary: Delete a discipline
      parameters:
        - in: path
          name: disciplineId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ─── Forms ────────────────────────────────────────────────────────────────
  /forms:
    get:
      operationId: listForms
      tags: [forms]
      summary: List forms (public + dojo-specific based on user)
      parameters:
        - in: query
          name: discipline_id
          schema:
            type: string
        - in: query
          name: dojo_id
          schema:
            type: string
      responses:
        "200":
          description: List of forms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Form"
    post:
      operationId: createForm
      tags: [forms]
      summary: Create a form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FormInput"
      responses:
        "201":
          description: Created form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Form"

  /forms/{formId}:
    get:
      operationId: getForm
      tags: [forms]
      summary: Get a form with its postures and joints
      parameters:
        - in: path
          name: formId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Form with postures
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormDetail"
    patch:
      operationId: updateForm
      tags: [forms]
      summary: Update form metadata
      parameters:
        - in: path
          name: formId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FormUpdate"
      responses:
        "200":
          description: Updated form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Form"
    delete:
      operationId: deleteForm
      tags: [forms]
      summary: Delete a form
      parameters:
        - in: path
          name: formId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /forms/{formId}/publish:
    post:
      operationId: publishForm
      tags: [forms]
      summary: Publish a recorded form (saves postures + joints from recorder)
      parameters:
        - in: path
          name: formId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FormPublishInput"
      responses:
        "200":
          description: Published form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Form"

  # ─── Postures ─────────────────────────────────────────────────────────────
  /forms/{formId}/postures:
    get:
      operationId: listPostures
      tags: [postures]
      summary: List postures for a form
      parameters:
        - in: path
          name: formId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of postures
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Posture"
    post:
      operationId: createPosture
      tags: [postures]
      summary: Add a posture to a form
      parameters:
        - in: path
          name: formId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostureInput"
      responses:
        "201":
          description: Created posture
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Posture"

  /postures/{postureId}:
    patch:
      operationId: updatePosture
      tags: [postures]
      summary: Update a posture
      parameters:
        - in: path
          name: postureId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostureUpdate"
      responses:
        "200":
          description: Updated posture
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Posture"
    delete:
      operationId: deletePosture
      tags: [postures]
      summary: Delete a posture
      parameters:
        - in: path
          name: postureId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /forms/{formId}/postures/reorder:
    patch:
      operationId: reorderPostures
      tags: [postures]
      summary: Reorder postures within a form
      parameters:
        - in: path
          name: formId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderInput"
      responses:
        "200":
          description: Reordered

  # ─── Joints ───────────────────────────────────────────────────────────────
  /postures/{postureId}/joints:
    get:
      operationId: listJoints
      tags: [joints]
      summary: List joints for a posture
      parameters:
        - in: path
          name: postureId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of joints
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Joint"
    post:
      operationId: createJoint
      tags: [joints]
      summary: Add a joint rule to a posture
      parameters:
        - in: path
          name: postureId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JointInput"
      responses:
        "201":
          description: Created joint
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Joint"

  /joints/{jointId}:
    patch:
      operationId: updateJoint
      tags: [joints]
      summary: Update a joint rule
      parameters:
        - in: path
          name: jointId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JointUpdate"
      responses:
        "200":
          description: Updated joint
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Joint"
    delete:
      operationId: deleteJoint
      tags: [joints]
      summary: Delete a joint rule
      parameters:
        - in: path
          name: jointId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ─── Sessions ─────────────────────────────────────────────────────────────
  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List training sessions for current user
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Start a new training session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionInput"
      responses:
        "201":
          description: Created session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /sessions/{sessionId}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get a session with posture scores
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"
    patch:
      operationId: completeSession
      tags: [sessions]
      summary: Complete a session (save total score, timestamps)
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionUpdate"
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /sessions/{sessionId}/scores:
    post:
      operationId: savePostureScore
      tags: [sessions]
      summary: Save a posture score within a session
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostureScoreInput"
      responses:
        "201":
          description: Saved score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostureScore"

  # ─── Dashboard/Progress ───────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [sessions]
      summary: Get student dashboard stats (streak, total sessions, avg score)
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/progress:
    get:
      operationId: getProgressData
      tags: [sessions]
      summary: Get progress data (most improved, weakest posture, sparklines)
      responses:
        "200":
          description: Progress data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressData"

  # ─── Admin ────────────────────────────────────────────────────────────────
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Platform-wide stats (admin only)
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/activity:
    get:
      operationId: getRecentActivity
      tags: [admin]
      summary: Recent session activity feed (admin only)
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # ─── Stripe ───────────────────────────────────────────────────────────────
  /stripe-webhook:
    post:
      operationId: stripeWebhook
      tags: [stripe]
      summary: Stripe webhook handler
      responses:
        "200":
          description: Received

  /stripe/checkout:
    post:
      operationId: createCheckoutSession
      tags: [stripe]
      summary: Create a Stripe Checkout session for student subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInput"
      responses:
        "200":
          description: Checkout URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResult"

  /stripe/portal:
    post:
      operationId: createPortalSession
      tags: [stripe]
      summary: Create Stripe Customer Portal session for dojo billing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortalInput"
      responses:
        "200":
          description: Portal URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ─── User ───────────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: ["string", "null"]
        role:
          type: string
        dojo_id:
          type: ["string", "null"]
        stripe_customer_id:
          type: ["string", "null"]
        subscription_status:
          type: string
        camera_side:
          type: ["string", "null"]
        created_at:
          type: string

    ProfileUpdate:
      type: object
      properties:
        name:
          type: string
        camera_side:
          type: string

    UserUpdate:
      type: object
      properties:
        role:
          type: string
        dojo_id:
          type: ["string", "null"]

    Student:
      type: object
      required: [id, email]
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: ["string", "null"]
        sessions_count:
          type: integer
        avg_score:
          type: ["number", "null"]
        last_active:
          type: ["string", "null"]

    # ─── Dojo ───────────────────────────────────────────────────────────────
    Dojo:
      type: object
      required: [id, slug, name]
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        logo_url:
          type: ["string", "null"]
        accent_color:
          type: string
        invite_code:
          type: ["string", "null"]
        stripe_customer_id:
          type: ["string", "null"]
        subscription_status:
          type: string
        subscription_tier:
          type: string
        created_at:
          type: string

    DojoPublic:
      type: object
      required: [id, slug, name]
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        logo_url:
          type: ["string", "null"]
        accent_color:
          type: string
        student_count:
          type: integer
        form_count:
          type: integer

    DojoInput:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
        accent_color:
          type: string
        logo_url:
          type: ["string", "null"]

    DojoUpdate:
      type: object
      properties:
        name:
          type: string
        logo_url:
          type: ["string", "null"]
        accent_color:
          type: string

    DojoStats:
      type: object
      required: [student_count, session_count, avg_score, form_count]
      properties:
        student_count:
          type: integer
        session_count:
          type: integer
        avg_score:
          type: ["number", "null"]
        form_count:
          type: integer

    InviteCode:
      type: object
      required: [invite_code]
      properties:
        invite_code:
          type: string

    JoinDojoInput:
      type: object
      required: [invite_code]
      properties:
        invite_code:
          type: string

    # ─── Discipline ─────────────────────────────────────────────────────────
    Discipline:
      type: object
      required: [id, slug, name, is_public]
      properties:
        id:
          type: string
